{% extends "base.html" %}

{% block title %}Réinitialiser le mot de passe - Samapiece{% endblock %}

{% block content %}
<div style="max-width:600px;margin:40px auto;padding:20px;background:white;border-radius:8px;border:1px solid #ecf0f1;">
  <h2 style="color:#2c3e50;">🔁 Réinitialiser le mot de passe</h2>
  <p>Choisissez un nouveau mot de passe pour votre compte.</p>

  <form method="POST">
    <input type="hidden" name="token" value="{{ token }}">
    <div style="margin:12px 0;">
      <label style="font-weight:600;display:block;margin-bottom:8px;">Nouveau mot de passe</label>
      <input type="password" name="new_password" placeholder="Nouveau mot de passe" required style="width:100%;padding:12px;border-radius:8px;border:2px solid #e0e0e0;">
    </div>

    <div style="margin:12px 0;">
      <label style="font-weight:600;display:block;margin-bottom:8px;">Confirmer le mot de passe</label>
      <input type="password" name="confirm_password" placeholder="Confirmez le mot de passe" required style="width:100%;padding:12px;border-radius:8px;border:2px solid #e0e0e0;">
    </div>

    <div style="display:flex;gap:10px;margin-top:12px;">
      <button type="submit" class="btn-submit">Mettre à jour le mot de passe</button>
      <a href="{{ url_for('home') }}" class="btn-cancel">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
