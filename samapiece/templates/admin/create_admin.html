{% extends "base.html" %}

{% block content %}
<div class="admin-container">
    <h2>Créer un administrateur</h2>
    <form method="POST" action="{{ url_for('admin_create_admin') }}" class="admin-form">
        <div class="form-group">
            <label for="nom">Nom *</label>
            <input type="text" id="nom" name="nom" required>
        </div>
        <div class="form-group">
            <label for="prenom">Prénom *</label>
            <input type="text" id="prenom" name="prenom" required>
        </div>
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Mot de passe *</label>
            <input type="password" id="password" name="password" required>
            <small>8+ caractères, 1 majuscule, 1 chiffre, 1 spécial.</small>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirmer le mot de passe *</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">Créer</button>
            <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
