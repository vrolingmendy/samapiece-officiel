{% extends "base.html" %}

{% block title %}Succès - Samapiece{% endblock %}

{% block content %}
<div style="text-align: center; margin: 40px 0;">
    <h2 style="color: #27ae60; font-size: 2em;">✓ {{ message }}</h2>
    
    <p style="font-size: 1.1em; color: #7f8c8d; margin: 30px 0;">
        L'opération s'est déroulée avec succès.
    </p>
    
    <div style="margin-top: 40px;">
        <a href="{{ next_action_url }}" class="btn" style="font-size: 1.1em; padding: 15px 40px;">
            {{ next_action_text }}
        </a>
    </div>
    
    <div style="margin-top: 20px;">
        <a href="{{ url_for('home') }}" class="btn secondary">Retour à l'accueil</a>
    </div>
</div>
{% endblock %}
