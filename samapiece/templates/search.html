{% extends "base.html" %}

{% block title %}Rechercher un document - Samapiece{% endblock %}

{% block extra_css %}
<style>
    .search-header {
        text-align: center;
        margin-bottom: 50px;
    }
    
    .search-header h1 {
        font-size: 2.5em;
        color: #2c3e50;
        margin-bottom: 10px;
    }
    
    .search-header p {
        font-size: 1.1em;
        color: #7f8c8d;
    }
    
    .search-bar {
        background-color: #f8f9fa;
        padding: 60px 40px;
        border-radius: 16px;
        margin-bottom: 40px;
    }
    
    .search-input-top {
        display: flex;
        margin-bottom: 40px;
        justify-content: center;
    }
    
    .search-input-top input {
        width: 100%;
        max-width: 500px;
        padding: 14px 20px;
        font-size: 1em;
        border: 2px solid #3498db;
        border-radius: 25px;
        background-color: white;
        color: #2c3e50;
    }
    
    .search-input-top input::placeholder {
        color: #3498db;
    }
    
    .search-input-top input:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }
    
    .search-form {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }
    
    .form-group {
        display: flex;
        flex-direction: column;
    }
    
    .form-group label {
        font-size: 0.85em;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .form-group input {
        padding: 12px 16px;
        font-size: 1em;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        background-color: white;
        color: #2c3e50;
        transition: all 0.3s ease;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }
    
    .form-group input::placeholder {
        color: #bdc3c7;
    }
    
    .search-buttons {
        display: flex;
        gap: 15px;
        margin-top: 30px;
        align-items: center;
        justify-content: center;
    }
    
    .btn-search {
        padding: 14px 40px;
        font-size: 1em;
        font-weight: 600;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
        flex: 1;
        max-width: 400px;
    }
    
    .btn-search:hover {
        background-color: #2980b9;
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(52, 152, 219, 0.3);
    }
    
    .btn-reset {
        padding: 12px 30px;
        font-size: 0.95em;
        font-weight: 600;
        background-color: white;
        color: #7f8c8d;
        border: 2px solid #ecf0f1;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-reset:hover {
        background-color: #f9f9f9;
        border-color: #3498db;
        color: #3498db;
    }
    
    .search-info {
        text-align: center;
        color: #7f8c8d;
        font-size: 0.9em;
        margin-top: 20px;
    }
    
    @media (max-width: 768px) {
        .search-bar {
            padding: 40px 20px;
        }
        
        .search-form {
            grid-template-columns: 1fr;
        }
        
        .search-buttons {
            flex-direction: column;
        }
        
        .btn-search {
            max-width: 100%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="search-header">
    <h1>🔎 Rechercher votre document</h1>
    <p>Retrouvez votre document officiel perdu</p>
</div>

<div class="search-bar">
    <div class="search-input-top">
        <input type="text" placeholder="Recherchez votre document ici" readonly style="cursor: default;">
    </div>
    
    <form method="POST" class="search-form-wrapper">
        <div class="search-form">
            <div class="form-group">
                <label for="prenom">Prénom *</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom">
            </div>
            
            <div class="form-group">
                <label for="nom">Nom *</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom de famille">
            </div>
            
            <div class="form-group">
                <label for="date_naissance">Date de naissance *</label>
                <input type="date" id="date_naissance" name="date_naissance" placeholder="jj/mm/aaaa">
            </div>
            
            <div class="form-group">
                <label for="lieu_naissance">Lieu de naissance *</label>
                <input type="text" id="lieu_naissance" name="lieu_naissance" placeholder="Ville de naissance">
            </div>
        </div>
        
        <div class="search-buttons">
            <button type="submit" class="btn-search">🔍 Lancer la recherche</button>
            <button type="reset" class="btn-reset">↺ Réinitialiser</button>
        </div>
        
        <div class="search-info">
            ℹ️ Remplissez les champs pour rechercher votre document
        </div>
    </form>
</div>

{% endblock %}
