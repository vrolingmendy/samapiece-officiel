{% extends "base.html" %}

{% block title %}Mot de passe oublié - Samapiece{% endblock %}

{% block content %}
<div style="max-width:600px;margin:40px auto;padding:20px;background:white;border-radius:8px;border:1px solid #ecf0f1;">
  <h2 style="color:#2c3e50;">🔒 Mot de passe oublié</h2>
  <p>Entrez l'adresse email associée à votre compte. Si un compte existe, vous recevrez un email avec un lien pour réinitialiser votre mot de passe.</p>

  <form method="POST">
    <div style="margin:16px 0;">
      <label style="font-weight:600;display:block;margin-bottom:8px;">Adresse email</label>
      <input type="email" name="email" placeholder="votre.email@exemple.com" required style="width:100%;padding:12px;border-radius:8px;border:2px solid #e0e0e0;">
    </div>

    <div style="display:flex;gap:10px;margin-top:12px;">
      <button type="submit" class="btn-submit">Envoyer le lien de réinitialisation</button>
      <a href="{{ url_for('register') }}" class="btn-cancel">Retour</a>
    </div>
  </form>
</div>
{% endblock %}
